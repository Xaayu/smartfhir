services:
  - type: web
    name: smartfhir-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: smartfhir-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: USE_POSTGRES
        value: false
      - key: SMARTFHIR_STORE_DIR
        value: /var/data/store
      - key: FRONTEND_ORIGINS
        value: "https://medtechtools.vercel.app,https://medtechtools-ghfufir6j-smart-fhir.vercel.app,https://medtechtools-f45oo20ri-smart-fhir.vercel.app,http://localhost:3000,http://localhost:5173"
      - key: API_KEY_PEPPER
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
